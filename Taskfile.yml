version: "3"

vars:
  BIN_DIR: .bin
  BINARY: "{{.BIN_DIR}}/lazydir"
  MODULE:
    sh: go list -m

tasks:
  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download
    sources:
      - go.mod
      - go.sum

  build:
    desc: Build the lazydir binary into .bin/
    deps: [deps]
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  run:
    desc: Build and start lazydir for testing (pass extra args via CLI_ARGS)
    deps: [build]
    cmds:
      - "{{.BINARY}} {{.CLI_ARGS}}"

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -s -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint (install via https://golangci-lint.run/welcome/install)
    cmds:
      - golangci-lint run ./...

  check:
    desc: Run all checks (fmt, vet, lint) then build
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: build

  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true
